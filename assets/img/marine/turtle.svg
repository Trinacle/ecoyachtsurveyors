<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustrated sea turtle gliding underwater with a yacht hull above">
  <defs>
    <linearGradient id="water-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a93b8"/>
      <stop offset="0.5" stop-color="#1f547a"/>
      <stop offset="1" stop-color="#0a1f33"/>
    </linearGradient>
    <linearGradient id="shell-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a5a3a"/>
      <stop offset="1" stop-color="#27331d"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#water-t)"/>
  <!-- light shafts -->
  <g opacity="0.18" fill="#eaf3f9">
    <polygon points="300,0 360,0 520,900 420,900"/>
    <polygon points="780,0 830,0 940,900 860,900"/>
    <polygon points="1200,0 1240,0 1330,900 1260,900"/>
  </g>
  <!-- yacht hull silhouette at surface -->
  <g opacity="0.4" transform="translate(360,-30)">
    <path d="M0,90 C120,90 360,120 520,110 C460,160 120,170 0,150 Z" fill="#0a1726"/>
    <rect y="60" width="520" height="34" fill="#0a1726"/>
  </g>
  <!-- surface line -->
  <rect y="120" width="1600" height="6" fill="#9ec7dd" opacity="0.4"/>
  <!-- turtle -->
  <g transform="translate(820,500) rotate(-8)">
    <!-- shell -->
    <ellipse cx="0" cy="0" rx="230" ry="160" fill="url(#shell-t)"/>
    <path d="M-150,-60 L-60,-120 L70,-130 L160,-70 L180,10 L150,90 L40,130 L-80,128 L-170,70 L-190,-10 Z" fill="none" stroke="#5e7048" stroke-width="4"/>
    <path d="M-90,-40 L0,-30 L80,-50 M-110,30 L-10,45 L90,30 M-80,90 L20,100 L100,86" stroke="#5e7048" stroke-width="3" fill="none" opacity="0.8"/>
    <circle cx="-40" cy="-20" r="10" fill="#3a4a2c"/>
    <circle cx="60" cy="-10" r="12" fill="#3a4a2c"/>
    <circle cx="20" cy="50" r="11" fill="#3a4a2c"/>
    <circle cx="-80" cy="60" r="9" fill="#3a4a2c"/>
    <!-- head -->
    <ellipse cx="220" cy="-20" rx="60" ry="46" fill="#3c4a2e"/>
    <circle cx="245" cy="-32" r="6" fill="#0d141c"/>
    <circle cx="247" cy="-34" r="2" fill="#dfc398"/>
    <!-- flippers -->
    <path d="M150,-110 C220,-170 300,-180 340,-150 C300,-130 240,-110 180,-90 Z" fill="#33402a"/>
    <path d="M-160,-90 C-230,-120 -300,-100 -320,-60 C-260,-70 -200,-60 -150,-40 Z" fill="#33402a"/>
    <path d="M140,110 C200,170 260,190 290,170 C250,140 200,120 160,110 Z" fill="#33402a"/>
    <path d="M-170,100 C-240,150 -300,160 -320,120 C-260,110 -200,90 -160,80 Z" fill="#33402a"/>
  </g>
  <!-- bubbles -->
  <g fill="#eaf3f9" opacity="0.6">
    <circle cx="560" cy="320" r="9"/>
    <circle cx="600" cy="260" r="6"/>
    <circle cx="540" cy="240" r="4"/>
    <circle cx="1080" cy="700" r="7"/>
    <circle cx="1120" cy="650" r="5"/>
  </g>
  <text x="40" y="860" font-family="Inter,sans-serif" font-size="20" fill="#dfc398" opacity="0.85">Marine life — placeholder illustration</text>
</svg>
