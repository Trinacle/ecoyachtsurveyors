<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustrated humpback whale breaching with a sailing yacht on the horizon">
  <defs>
    <linearGradient id="sky-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fb8d6"/>
      <stop offset="0.55" stop-color="#cfe2ef"/>
      <stop offset="1" stop-color="#e8f1f7"/>
    </linearGradient>
    <linearGradient id="sea-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a5878"/>
      <stop offset="1" stop-color="#0e2236"/>
    </linearGradient>
    <radialGradient id="sun-w" cx="0.78" cy="0.28" r="0.22">
      <stop offset="0" stop-color="#fff4dc" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fff4dc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky-w)"/>
  <rect width="1600" height="900" fill="url(#sun-w)"/>
  <!-- distant yacht -->
  <g opacity="0.55" transform="translate(230,560) scale(0.8)">
    <polygon points="0,40 120,40 100,55 20,55" fill="#16314a"/>
    <rect x="40" y="5" width="42" height="35" fill="#16314a"/>
    <polygon points="40,5 40,-40 0,5" fill="#f4f7fa"/>
    <polygon points="82,5 82,-30 118,5" fill="#f4f7fa"/>
    <line x1="61" y1="-40" x2="61" y2="-72" stroke="#16314a" stroke-width="2"/>
  </g>
  <rect y="600" width="1600" height="300" fill="url(#sea-w)"/>
  <!-- horizon haze -->
  <rect y="590" width="1600" height="40" fill="#cfe2ef" opacity="0.4"/>
  <!-- whale body -->
  <g transform="translate(780,470)">
    <path d="M-260,120 C-300,60 -260,-10 -150,-50 C-20,-95 120,-110 230,-70 C300,-45 320,0 300,40 C285,72 240,95 180,108 C90,128 -10,132 -110,128 C-200,124 -245,150 -260,120 Z" fill="#2b3a4d"/>
    <path d="M-200,40 C-160,10 -80,-20 0,-30 C90,-40 180,-25 240,5 C260,17 268,30 262,42 C200,18 90,2 -10,8 C-110,14 -170,40 -200,40 Z" fill="#46606f" opacity="0.7"/>
    <!-- belly grooves -->
    <path d="M120,95 L150,118 M150,92 L185,116 M180,86 L220,108" stroke="#1a2735" stroke-width="3" opacity="0.6"/>
    <!-- tail flukes -->
    <path d="M-255,118 C-330,70 -360,40 -355,20 C-340,30 -300,55 -255,90 Z" fill="#243140"/>
    <path d="M-255,124 C-330,170 -360,200 -350,215 C-335,200 -300,170 -255,140 Z" fill="#243140"/>
    <!-- flipper -->
    <path d="M40,70 C20,140 -10,180 -45,190 C-20,150 0,110 25,80 Z" fill="#243140"/>
    <!-- eye -->
    <circle cx="225" cy="-25" r="9" fill="#10171f"/>
    <circle cx="228" cy="-28" r="3" fill="#dfc398"/>
    <!-- water spray -->
    <g opacity="0.7" fill="#eaf3f9">
      <ellipse cx="195" cy="-95" rx="8" ry="22"/>
      <ellipse cx="215" cy="-120" rx="6" ry="16"/>
      <ellipse cx="178" cy="-108" rx="5" ry="14"/>
    </g>
  </g>
  <!-- splash -->
  <g fill="#eaf3f9" opacity="0.85">
    <ellipse cx="520" cy="610" rx="240" ry="26"/>
    <path d="M380,600 q20,-30 5,-55 q30,25 15,55 Z"/>
    <path d="M650,605 q15,-28 0,-48 q28,22 12,50 Z"/>
    <circle cx="430" cy="575" r="6"/>
    <circle cx="690" cy="575" r="5"/>
    <circle cx="560" cy="565" r="7"/>
  </g>
  <!-- foreground ripples -->
  <g stroke="#3a6788" stroke-width="3" fill="none" opacity="0.5">
    <path d="M0,740 q60,-14 120,0 t120,0 t120,0 t120,0 t120,0 t120,0 t120,0 t120,0 t120,0 t120,0 t120,0 t120,0 t120,0"/>
    <path d="M0,800 q80,-16 160,0 t160,0 t160,0 t160,0 t160,0 t160,0 t160,0 t160,0 t160,0"/>
  </g>
  <text x="40" y="860" font-family="Inter,sans-serif" font-size="20" fill="#dfc398" opacity="0.85">Marine life — placeholder illustration</text>
</svg>
